<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mariage - Claire & Thomas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
    <div class="overlay">
        <h1>Claire & Thomas</h1>
        <p>Nous nous marions !</p>
        <p class="date">12 Juin 2027</p>
    </div>
</header>

<section class="info">
    <h2>Informations</h2>
    <p><strong>Date :</strong> 12 Juin 2027</p>
    <p><strong>Heure :</strong> 15h00</p>
    <p><strong>Lieu :</strong> Château de la Roseraie, Provence</p>
</section>

<section class="rsvp">
    <h2>Confirmation de présence</h2>
    <form action="contact.php" method="POST">
        <input type="text" name="nom" placeholder="Nom et prénom" required>
        <input type="email" name="email" placeholder="Email" required>
        
        <select name="presence" required>
            <option value="">-- Votre réponse --</option>
            <option value="Oui">Oui, je serai présent(e)</option>
            <option value="Non">Non, je ne pourrai pas venir</option>
        </select>

        <textarea name="message" placeholder="Message (optionnel)"></textarea>

        <button type="submit">Envoyer ma réponse</button>
    </form>
</section>

<footer>
    <p>© 2027 Claire & Thomas</p>
</footer>

</body>
</html>
